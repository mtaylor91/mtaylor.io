
<!-- Top Section -->
<div class="section-wrapper"
    [ngStyle]="{'background-color': colors.backgroundPrimary}">
  <div class="section section-top">
    <h1>{{heading}}</h1>
  </div>
</div>

<!-- Bottom Section -->
<div class="section-wrapper"
    [ngStyle]="{'background-color': colors.backgroundComplement}">
  <div class="section section-bottom">

    <!-- Navigation Bar -->
    <div class="nav-menu">
      <div *ngFor="let link of links"
          class="nav-link"
          routerLinkActive="active"
          [ngStyle]="{'background-color': navlinkBackground(link)}">
        <a routerLink="{{link.target}}">
          <h3 [ngStyle]="{'color': navlinkColor(link)}">
            {{link.text}}
          </h3>
        </a>
      </div>
    </div>

    <!-- Content -->
    <router-outlet></router-outlet>
  </div>
</div>
