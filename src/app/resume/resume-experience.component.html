
<hr/>
<h2>Experience</h2>
<hr/>

<div *ngFor="let employer of employers">
  <h3>{{employer.name}}</h3>

  <div *ngFor="let position of employer.positions">

    <div>
      <h4 [ngStyle]="positionNameStyle(position)">{{position.name}}</h4>
      <h4 [ngStyle]="positionDatesStyle(position)">{{position.dates}}</h4>
    </div>

    <ul>
      <li *ngFor="let responsibility of position.responsibilities">
        {{responsibility}}
      </li>
    </ul>

  </div>
</div>
