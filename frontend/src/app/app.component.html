
<!-- App Container -->
<div [ngStyle]="containerStyle()">

  <!-- Top Section -->
  <div [ngStyle]="sectionWrapperStyle('top')">
    <div [ngStyle]="sectionStyle()">

      <!-- Title Logo / Home -->
      <div [ngStyle]="titleStyle('top')">
        <a routerLink="/" [ngStyle]="titleLinkStyle">
          <h1 [ngStyle]="titleHeadingStyle()">
            {{heading}}
          </h1>
        </a>
      </div>

      <!-- Login -->
      <div [ngStyle]="loginStyle()">
        <app-login></app-login>
      </div>
    </div>
  </div>

  <!-- Bottom Section -->
  <div [ngStyle]="sectionWrapperStyle('bottom')">
    <div [ngStyle]="sectionStyle()">

      <!-- Navigation Bar -->
      <div [ngStyle]="navStyle">
        <div *ngFor="let link of links"
            routerLinkActive="active"
            [ngStyle]="navlinkStyle(link)">
          <!-- Local links use Angular router -->
          <a *ngIf="! link.target.startsWith('http')"
              routerLink="{{link.target}}"
              [ngStyle]="{'text-decoration': 'none'}">
            <h3 [ngStyle]="navlinkHeadingStyle(link)">
              {{link.text}}
            </h3>
          </a>
          <!-- Construct normal links for external targets -->
          <a *ngIf="link.target.startsWith('http')"
              href="{{link.target}}"
              [ngStyle]="{'text-decoration': 'none'}">
            <h3 [ngStyle]="navlinkHeadingStyle(link)">
              {{link.text}}
            </h3>
          </a>
        </div>
      </div>

      <!-- Content -->
      <router-outlet></router-outlet>
    </div>
  </div>

</div>
