
<!-- Blog Content -->
<div *ngIf="!loading" [ngStyle]="postContentStyle()">
  <h1 [ngStyle]="postTitleStyle()">{{post.name}}</h1>

  <!-- Inject HTML content from post -->
  <div [innerHTML]="content">
  </div>
</div>

<!-- Blog Navigation -->
<div [ngStyle]="navigationStyle()">
  <ul>
    <li *ngFor="let post of posts" routerLinkActive="active">
      <a routerLink="{{post.link}}" [ngStyle]="navigationPostStyle(post)">
        {{post.name}}
      </a>
    </li>
  </ul>
</div>
