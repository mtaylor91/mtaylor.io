
<!-- Blog Content -->
<div *ngIf="!loading" [ngStyle]="postContainerStyle()">
  <!-- Post Heading -->
  <div [ngStyle]="postContentHeadingStyle()">
    <h1 [ngStyle]="postTitleStyle()"
        [contentEditable]="editable">
      {{post.name}}
    </h1>

    <input *ngIf="editable"
      [ngStyle]="postLinkInputStyle()"
      [(ngModel)]="post.link"/>

    <button [ngStyle]="editableButtonStyle()"
        (click)="toggleEditable()">
      {{editableButtonText()}}
    </button>
  </div>

  <div *ngIf="!editable"
    [ngStyle]="postContentStyle()"
    [innerHTML]="content">
  </div>

  <!-- Show Markdown editor if editable -->
  <textarea #contentEditor
    *ngIf="editable"
    [ngModel]="post.content"
    [ngStyle]="postContentEditStyle()"
    (keyup)="setPostContent(contentEditor.value)">
  </textarea>
</div>

<!-- Blog Navigation -->
<div>
  <!-- Navigation Heading -->
  <h2 [ngStyle]="recentPostsStyle()">Recent Posts</h2>

  <!-- Navigation Links -->
  <ul dir="rtl" [ngStyle]="navigationListStyle()">
    <li *ngFor="let post of posts" routerLinkActive="active">
      <a routerLink="{{post.link}}"
          [ngStyle]="navigationPostStyle(post)">
        {{post.name}}
      </a>
    </li>
  </ul>

  <!-- Create Post Button -->
  <p [ngStyle]="createPostButtonStyle()"
      (click)="createPost()">
    New
  </p>
</div>
